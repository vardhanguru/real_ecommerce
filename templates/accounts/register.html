<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Register</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(135deg,#141e30,#243b55);
            overflow:hidden;
        }

        .container{
            width:420px;
            padding:40px;
            border-radius:20px;
            background:rgba(255,255,255,0.08);
            backdrop-filter:blur(12px);
            -webkit-backdrop-filter:blur(12px);
            border:1px solid rgba(255,255,255,0.2);
            box-shadow:0 8px 32px rgba(0,0,0,0.35);
            color:white;
        }

        .container h1{
            text-align:center;
            margin-bottom:30px;
            font-size:32px;
            letter-spacing:1px;
        }

        form p{
            margin-bottom:18px;
        }

        label{
            display:block;
            margin-bottom:8px;
            font-size:15px;
            font-weight:600;
        }

        input{
            width:100%;
            padding:14px;
            border:none;
            outline:none;
            border-radius:12px;
            background:rgba(255,255,255,0.12);
            color:white;
            font-size:15px;
            border:1px solid rgba(255,255,255,0.15);
            transition:0.3s;
        }

        input:focus{
            border:1px solid #00d4ff;
            background:rgba(255,255,255,0.18);
            box-shadow:0 0 10px rgba(0,212,255,0.4);
        }

        input::placeholder{
            color:#ddd;
        }

        .btn{
            width:100%;
            padding:14px;
            border:none;
            border-radius:12px;
            background:#00d4ff;
            color:black;
            font-size:16px;
            font-weight:bold;
            cursor:pointer;
            transition:0.3s;
            margin-top:10px;
        }

        .btn:hover{
            background:white;
            transform:translateY(-2px);
        }

        ul.errorlist{
            list-style:none;
            color:#ff9b9b;
            margin-bottom:10px;
            font-size:14px;
        }

    </style>
</head>
<body>

    <div class="container">

        <h1>Register User</h1>

        <form method="POST">
            {% csrf_token %}

            {{ form.as_p }}

            <button type="submit" class="btn">
                Register
            </button>
        </form>

    </div>

</body>
</html>
