<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Session Set</title>

    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body{
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #f5f7fa, #c3cfe2);
        }

        .card{
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            width: 400px;
        }

        .card h1{
            color: #333;
            margin-bottom: 20px;
        }

        .info{
            background: #f4f4f4;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 15px;
            text-align: left;
        }

        .info p{
            margin: 8px 0;
            color: #555;
            font-size: 16px;
        }

        .success{
            color: green;
            font-weight: bold;
            margin-top: 15px;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>Session Created</h1>

        <div class="info">
            <p><strong>Email:</strong> {{ request.session.email }}</p>
            <p><strong>Username:</strong> {{ request.session.username }}</p>
        </div>

        <p class="success">Session data stored successfully!</p>
    </div>

</body>
</html>
