<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Employee Login</title>

    <!-- GOOGLE FONT -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins', sans-serif;
        }

        body{

            min-height:100vh;

            display:flex;
            justify-content:center;
            align-items:center;

            padding:20px;

            background:
                linear-gradient(
                    135deg,
                    #f5f5f5,
                    #d9d9d9
                );

            overflow:hidden;
        }

        /* =========================
            LOGIN CONTAINER
        ========================== */

        .container{

            width:100%;
            max-width:430px;

            padding:42px 36px;

            border-radius:32px;

            background:rgba(255,255,255,0.22);

            border:1px solid rgba(255,255,255,0.25);

            backdrop-filter:blur(18px);
            -webkit-backdrop-filter:blur(18px);

            box-shadow:
                0 8px 32px rgba(0,0,0,0.08);

            transition:0.35s ease;
        }

        .container:hover{
            transform:translateY(-4px);

            box-shadow:
                0 14px 40px rgba(0,0,0,0.12);
        }

        /* =========================
            HEADING
        ========================== */

        .container h1{

            text-align:center;

            margin-bottom:32px;

            font-size:2rem;

            font-weight:600;

            color:#111;

            letter-spacing:0.5px;
        }

        /* =========================
            FORM
        ========================== */

        form p{
            margin-bottom:22px;
        }

        label{

            display:block;

            margin-bottom:10px;

            font-size:0.95rem;

            font-weight:500;

            color:#222;
        }

        input{

            width:100%;

            padding:15px 18px;

            border:none;

            outline:none;

            border-radius:16px;

            background:rgba(255,255,255,0.35);

            border:1px solid rgba(255,255,255,0.28);

            color:#111;

            font-size:0.95rem;

            transition:0.3s ease;
        }

        input:focus{

            background:rgba(255,255,255,0.55);

            border:1px solid rgba(0,0,0,0.15);

            box-shadow:
                0 4px 14px rgba(0,0,0,0.08);
        }

        input::placeholder{
            color:#666;
        }

        /* =========================
            BUTTON
        ========================== */

        .btn{

            width:100%;

            padding:15px;

            border:none;

            border-radius:18px;

            background:#111;

            color:white;

            font-size:1rem;

            font-weight:500;

            cursor:pointer;

            transition:0.3s ease;

            margin-top:10px;
        }

        .btn:hover{

            background:#333;

            transform:translateY(-2px);

            box-shadow:
                0 10px 24px rgba(0,0,0,0.12);
        }

        /* =========================
            ERRORS
        ========================== */

        ul.errorlist{

            list-style:none;

            margin-bottom:12px;

            color:#b91c1c;

            font-size:0.9rem;
        }

        /* =========================
            RESPONSIVE
        ========================== */

        @media(max-width:500px){

            .container{
                padding:34px 24px;
            }

            .container h1{
                font-size:1.7rem;
            }
        }

    </style>

</head>
<body>

    <div class="container">

        <h1>
            Employee Login
        </h1>

        <form method="POST">

            {% csrf_token %}

            {{ form.as_p }}

            <button type="submit" class="btn">
                Login
            </button>

        </form>

    </div>

</body>
</html>
