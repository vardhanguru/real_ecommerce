<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Success</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:#f5f5f5;
        }

        .box{
            background:white;
            padding:40px;
            border-radius:10px;
            text-align:center;
            box-shadow:0 0 10px rgba(0,0,0,0.1);
        }

        h1{
            color:green;
            margin-bottom:15px;
        }

        p{
            margin-bottom:20px;
            color:#555;
        }

        a{
            text-decoration:none;
            background:green;
            color:white;
            padding:10px 20px;
            border-radius:5px;
        }

    </style>

</head>
<body>

    <div class="box">

        <h1>Payment Successful</h1>

        <p>Your order has been placed successfully.</p>

        <a href="/">Go To Home</a>

    </div>

</body>
</html>
